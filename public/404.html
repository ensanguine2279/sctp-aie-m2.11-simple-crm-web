<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Simple CRM</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current URL and redirects it to the index.html page
      // with the query string intact so the router can pick it up.
      var pathSegmentsToKeep = 1; // Adjust based on your repo name depth (/sctp-aie-m2.11-simple-crm-web/ is 1 segment)

      var l = window.location;
      var repo = l.pathname.split("/")[1];

      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          "/" +
          repo +
          "/?p=/" +
          l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/") +
          (l.search ? "&q=" + l.search.slice(1) : "") +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
